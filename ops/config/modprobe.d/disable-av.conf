install snd_soc_tegra210_admaif /usr/bin/true
install snd_soc_tegra_machine_driver /usr/bin/true
install snd_soc_tegra_utils /usr/bin/true
install snd_soc_tegra_pcm /usr/bin/true
install snd_soc_tegra210_i2s /usr/bin/true
install snd_soc_tegra210_dmic /usr/bin/true
install snd_soc_tegra210_adx /usr/bin/true
install snd_soc_tegra210_amx /usr/bin/true
install snd_soc_tegra210_mixer /usr/bin/true
install snd_soc_tegra210_mvc /usr/bin/true
install snd_soc_tegra210_ope /usr/bin/true
install snd_soc_tegra210_sfc /usr/bin/true
install snd_soc_tegra210_afc /usr/bin/true
install snd_soc_tegra186_asrc /usr/bin/true
install snd_soc_tegra186_arad /usr/bin/true
